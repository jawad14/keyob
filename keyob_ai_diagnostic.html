<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEYOB AI Diagnostic Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .wrapper {
    width: 100%;
    max-width: 900px;
    padding: 40px 24px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }

  @keyframes flowDot {
    0%   { offset-distance: 0%;   opacity: 0; }
    5%   { opacity: 1; }
    80%  { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  @keyframes aiPulse {
    0%, 100% { opacity: 0.18; }
    50%       { opacity: 0.38; }
  }
  @keyframes nodePing {
    0%        { r: 7;  opacity: 0.6; }
    60%       { r: 14; opacity: 0;  }
    100%      { r: 14; opacity: 0;  }
  }
  @keyframes outcomeGrow {
    0%, 100% { opacity: 0.25; }
    50%       { opacity: 0.55; }
  }

  .flow-dot {
    offset-rotate: 0deg;
    animation: flowDot 4.5s ease-in-out infinite;
  }
  .ai-glow    { animation: aiPulse 3s ease-in-out infinite; }
  .ping       { animation: nodePing 2.8s ease-out infinite; }
  .outcome-glow { animation: outcomeGrow 3.2s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    .flow-dot, .ai-glow, .ping, .outcome-glow { animation: none; }
  }
</style>
</head>
<body>
<div class="wrapper">
