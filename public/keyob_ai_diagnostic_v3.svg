    <circle cx="40" cy="520" r="1.5"/><circle cx="120" cy="520" r="1.5"/><circle cx="200" cy="520" r="1.5"/>
    <circle cx="280" cy="520" r="1.5"/><circle cx="360" cy="520" r="1.5"/><circle cx="440" cy="520" r="1.5"/>
    <circle cx="520" cy="520" r="1.5"/><circle cx="600" cy="520" r="1.5"/>
  </g>

  <g stroke="#0D2B6B" stroke-width="0.3" opacity="0.07" fill="none">
    <line x1="20" y1="112" x2="660" y2="112"/>
    <line x1="20" y1="200" x2="660" y2="200"/>
    <line x1="20" y1="288" x2="660" y2="288"/>
    <line x1="20" y1="380" x2="660" y2="380"/>
