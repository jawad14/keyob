<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" role="img" aria-labelledby="kdt kdd">
  <title id="kdt">KEYOB AI Diagnostic Map</title>
  <desc id="kdd">An abstract business workflow showing AI analyzing process nodes, identifying inefficiencies, and routing improvements toward measurable outcomes.</desc>

  <style>
    @keyframes flowDot {
      0%   { offset-distance: 0%;   opacity: 0; }
      5%   { opacity: 1; }
      80%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @keyframes aiPulse {
      0%, 100% { opacity: 0.18; }
      50%      { opacity: 0.38; }
    }
    @keyframes nodePing {
      0%   { r: 7;  opacity: 0.6; }
      60%  { r: 14; opacity: 0;   }
      100% { r: 14; opacity: 0;   }
    }
    @keyframes outcomeGrow {
      0%, 100% { opacity: 0.25; }
      50%      { opacity: 0.55; }
    }
    .flow-dot      { offset-rotate: 0deg; animation: flowDot 4.5s ease-in-out infinite; }
    .ai-glow       { animation: aiPulse 3s ease-in-out infinite; }
    .ping          { animation: nodePing 2.8s ease-out infinite; }
    .outcome-glow  { animation: outcomeGrow 3.2s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .flow-dot, .ai-glow, .ping, .outcome-glow { animation: none; }
    }
  </style>

  <g opacity="0.06" fill="#0A1F4B">
